<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pakenham Hospital - Smart Patient Management System (Prototype)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="#/landing">Pakenham Hospital PMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsMain" aria-controls="navbarsMain" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarsMain">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="nav-links">
            <!-- Dynamic links injected by ui.js based on role/session -->
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
            <li class="nav-item me-2">
              <a class="nav-link position-relative" href="#/notifications">
                Notifications
                <span class="badge bg-warning text-dark ms-1" id="notif-badge" style="display:none;">0</span>
              </a>
            </li>
            <li class="nav-item me-2">
              <a class="nav-link" href="#/email-log">Email Log</a>
            </li>
            <li class="nav-item me-2">
              <button class="btn btn-sm btn-outline-light" id="seed-btn" type="button">Seed Demo Data</button>
            </li>
            <li class="nav-item">
              <span class="navbar-text" id="nav-user">Guest</span>
            </li>
            <li class="nav-item ms-2">
              <button class="btn btn-sm btn-light" id="logout-btn" type="button" style="display:none;">Logout</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4" id="app-root">
      <!-- Views injected here by ui.js router -->
    </main>

    <!-- Booking Confirm Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirm Booking</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="confirmModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmBookingBtn">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Invoice Preview Modal -->
    <div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Invoice Preview</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <iframe id="invoiceFrame" title="Invoice" style="width:100%;height:70vh;border:0;"></iframe>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <a class="btn btn-success" id="downloadInvoiceBtn" download>Download PDF</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Complete Appointment Modal -->
    <div class="modal fade" id="completeModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Complete Appointment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <label class="form-label">Notes & Next Steps</label>
            <textarea class="form-control" id="completeNotes" rows="5" placeholder="E.g., Performed exam... Recommend follow-up in 2 weeks..."></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="confirmCompleteBtn">Save & Complete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editUserForm" class="row g-2">
              <input type="hidden" name="id" />
              <div class="col-6"><label class="form-label">First Name</label><input class="form-control" name="firstName" required></div>
              <div class="col-6"><label class="form-label">Last Name</label><input class="form-control" name="lastName" required></div>
              <div class="col-12"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>
              <div class="col-6"><label class="form-label">Username</label><input class="form-control" name="username" required></div>
              <div class="col-6"><label class="form-label">Password <span class="text-muted small">(leave blank to keep)</span></label><input class="form-control" name="password" type="password"></div>
              <div class="col-6"><label class="form-label">Role</label>
                <select class="form-select" name="role" required>
                  <option value="patient">Patient</option>
                  <option value="doctor">Doctor</option>
                  <option value="receptionist">Receptionist</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="col-6"><label class="form-label">Specialty (Doctor)</label><input class="form-control" name="specialty" placeholder="General"></div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveUserBtn">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toasts -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/appointments.js"></script>
    <script type="module" src="js/invoice.js"></script>
    <script type="module" src="js/ui.js"></script>
  </body>
  </html>
